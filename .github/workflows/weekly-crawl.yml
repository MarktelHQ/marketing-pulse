name: Weekly Event Crawl

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run crawl pipeline
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python pipeline/crawl.py

      - name: Commit updated events.json
        run: |
          git config --global user.name  "Marketing Pulse Bot"
          git config --global user.email "bot@marketing-pulse"
          git add data/events.json
          git diff --staged --quiet || git commit -m "chore: weekly event update $(date -u +%Y-%m-%d)"
          git push
